name: Code Test

on:
  pull_request:
    branches:
      - master
    paths:
      - 'KNcloud/ServiceLib/Services/CoreConfig/**'
      - 'KNcloud/ServiceLib/Handler/Fmt/**'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Setup .NET
      uses: actions/setup-dotnet@v5.3.0
      with:
        dotnet-version: '8.0.x'

    - name: Test Code
      working-directory: ./KNcloud
      run: dotnet test ./ServiceLib.Tests
