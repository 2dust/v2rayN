name: Make release workflows manual only

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/manualize-release-workflows.yml

permissions:
  contents: write

jobs:
  update-workflows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Remove automatic push triggers
        shell: python {0}
        run: |
          from pathlib import Path

          files = [
              Path('.github/workflows/build-linux.yml'),
              Path('.github/workflows/build-osx.yml'),
              Path('.github/workflows/build-windows.yml'),
              Path('.github/workflows/build-windows-desktop.yml'),
          ]

          trigger = "  push:\n    branches:\n      - master\n"

          for path in files:
              text = path.read_text(encoding='utf-8')
              count = text.count(trigger)
              if count != 1:
                  raise RuntimeError(f'{path}: expected one push trigger, found {count}')
              path.write_text(text.replace(trigger, '', 1), encoding='utf-8', newline='\n')
              print(f'Updated {path}')

          helper = Path('.github/workflows/manualize-release-workflows.yml')
          helper.unlink()
          print(f'Removed {helper}')

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows
          git diff --cached --check
          git commit -m "Make all release workflows manual only"
          git push origin HEAD:master
